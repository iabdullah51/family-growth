<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>نمو أسرتنا</title>
    <style>
        body {
            background-color: #f7f3f0;
            background-image: radial-gradient(#d1bfa7 1px, transparent 1px);
            background-size: 20px 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden; /* يمنع التصفح الجانبي نهائياً */
        }

        .header-title {
            color: #8d7b68;
            font-size: 1.8rem;
            margin: 30px 0;
            text-align: center;
        }

        /* الحاوية الرئيسية مرنة 100% */
        .timeline {
            position: relative;
            width: 100%;
            max-width: 800px;
            padding: 20px 0;
        }

        /* الخط العمودي في المنتصف */
        .timeline::after {
            content: '';
            position: absolute;
            width: 2px;
            background: #c2b2a3;
            top: 0;
            bottom: 0;
            left: 50%;
            margin-left: -1px;
            border-left: 2px dashed #c2b2a3;
        }

        .container {
            padding: 10px 40px;
            position: relative;
            background-color: inherit;
            width: 50%; /* نصف الشاشة */
            box-sizing: border-box;
        }

        /* النقطة على الخط */
        .container::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            right: -6px;
            background-color: #8d7b68;
            border: 2px solid #fff;
            top: 20px;
            border-radius: 50%;
            z-index: 1;
        }

        /* الصناديق في الجهة اليمنى */
        .right { left: 50%; }

        /* الصناديق في الجهة اليسرى */
        .left { left: 0; }

        .left::after { left: -6px; }

        .content {
            padding: 15px;
            background-color: white;
            position: relative;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 1px solid #e5dfd9;
        }

        .date { font-weight: bold; color: #8d7b68; font-size: 0.75rem; }
        .title { font-weight: bold; font-size: 0.95rem; margin: 5px 0; color: #5d5043; }
        .message { font-size: 0.8rem; color: #7a6e63; font-style: italic; margin-top: 5px; border-top: 1px solid #eee; padding-top: 5px; }

        /* تعديلات الجوال (أهم جزء) */
        @media screen and (max-width: 600px) {
            .timeline::after { left: 31px; } /* نقل الخط لليسار قليلاً */
            
            .container {
                width: 100%;
                padding-left: 70px;
                padding-right: 25px;
            }
            
            .container::after {
                left: 25px; /* وضع النقطة على الخط الجديد */
            }

            .left, .right { left: 0; }
            
            .header-title { font-size: 1.5rem; }
        }
    </style>
</head>

        const timeline = document.getElementById('timeline-id');
        const lines = rawData.trim().split('\n');

        lines.forEach((line, index) => {
            const parts = line.split(' - ');
            if (parts.length < 2) return;

            const titlePart = parts[0].split(': ')[1];
            const date = parts[1];
            const msg = parts[2] || "";
            const side = (index % 2 === 0) ? "right" : "left";

            const container = document.createElement('div');
            container.className = `container ${side}`;
            container.innerHTML = `
                <div class="content">
                    <span class="date">${date}</span>
                    <div class="title">${titlePart}</div>
                    ${msg ? `<p class="message">${msg}</p>` : ''}
                </div>
            `;
            timeline.appendChild(container);
        });
