<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نمو أسرتنا</title>
    <style>
        body {
            background-color: #f7f3f0;
            margin: 0;
            padding: 20px 0;
            overflow-x: hidden; /* يمنع الخروج عن الإطار يميناً ويساراً */
        }
        .map-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100vw; /* عرض الشاشة بالكامل */
        }
        .station {
            position: relative;
            width: 100%;
            height: 180px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* الصناديق تتأرجح يميناً ويساراً بمسافة بسيطة */
        .content-box {
            position: absolute;
            width: 130px; /* عرض صغير ليناسب الجوال */
            background: white;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            font-size: 0.8rem;
        }
        .right-box { left: calc(50% + 20px); }
        .left-box { right: calc(50% + 20px); text-align: left; }
        
        .dot {
            width: 12px;
            height: 12px;
            background: #8d7b68;
            border-radius: 50%;
            z-index: 5;
        }
        /* الخط المنقط المتعرج */
        #svg-canvas {
            position: absolute;
            top: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="map-wrapper" id="map-container">
        <h1 style="color: #8d7b68; text-align: center;">نمو أسرتنا</h1>
        <svg id="svg-canvas"><path id="map-path" fill="none" stroke="#c2b2a3" stroke-width="2" stroke-dasharray="5,5" /></svg>
        </div>
    <script>
        // ضع هنا الجزء الخاص بـ Script من الرد السابق مع التأكد من تحديث أسماء الـ Classes
    </script>
</body>
</html>
